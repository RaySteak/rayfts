<!doctype html>

    <link rel="stylesheet" href="css/control.css">
    <style>
        #mail_list .email span:only-child {
            color: #000000;
        }

        #mail_list .mail-entry-cell input {
            width: 100%;
            min-height: 46px;
            border: 1px solid #ced4da;
            border-radius: 0.35rem;
            padding: 0.65rem 0.75rem;
            color: #212529;
            background: #fff;
        }

        #mail_list .mail-entry-cell:last-child {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        #mail_list .mail-entry-cell:last-child input {
            width: auto;
            min-width: 0;
            flex: 1 1 auto;
        }

        .mail-entry-submit {
            flex: 0 0 auto;
            width: auto;
            height: 28px;
            min-height: 28px;
            margin-top: 0;
            padding: 0 0.55rem;
            border: 1px solid #1e7e34;
            border-radius: 0.35rem;
            background: #28a745;
            color: #fff;
            font-size: 0.75rem;
            font-weight: 600;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            align-self: center;
            cursor: pointer;
            transition: background-color 0.15s ease, transform 0.15s ease;
        }

        .mail-entry-add-row {
            margin-top: 0.85rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .mail-entry-add-row .mail-entry-submit {
            width: 36px;
            min-width: 36px;
            padding: 0;
            border-radius: 999px;
        }

        .mail-entry-add-row .mail-entry-submit i {
            font-size: 0.8rem;
        }

        .mail-entry-submit:hover {
            background: #218838;
            transform: translateY(-1px);
        }

        .mail-entry-submit i {
            font-size: 0.7rem;
        }

        .mail-entry-remove {
            flex: 0 0 auto;
            width: 28px;
            min-width: 28px;
            height: 28px;
            min-height: 28px;
            margin-top: 0;
            padding: 0;
            border: 1px solid #dc3545;
            border-radius: 999px;
            background: linear-gradient(135deg, #ffffff 0%, #ffe8eb 45%, #ff5a67 100%);
            color: #8a1a24;
            font-size: 1rem;
            font-weight: 700;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            align-self: center;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(220, 53, 69, 0.22);
            transition: transform 0.15s ease, box-shadow 0.2s ease, color 0.2s ease, background 0.2s ease;
        }

        .mail-entry-remove:hover {
            background: linear-gradient(135deg, #ffd7dc 0%, #ff7e8c 45%, #dc3545 100%);
            color: #ffffff;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(220, 53, 69, 0.35);
        }
    </style>
    <link rel="shortcut icon" href="/images/favicon.ico" />
    <link rel="apple-touch-icon" href="/images/apple-touch-icon.png" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="/js/common.js"></script>
</head>
